<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .input-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #16213e;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      opacity: 0.9;
    }
    .balance {
      margin-top: 15px;
      padding: 15px;
      background: #16213e;
      border-radius: 8px;
      text-align: center;
    }
    .balance-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
    }
    .balance-amount {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }
    .balance-unit {
      font-size: 14px;
      color: #aaa;
    }
    .loading {
      color: #aaa;
      font-size: 14px;
    }
    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 10px;
    }
    .last-updated {
      font-size: 10px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h2>RustChain Wallet</h2>
  </div>
  
  <div class="input-group">
    <label>Wallet ID / Address</label>
    <input type="text" id="walletId" placeholder="e.g., tomisnotcat">
  </div>
  
  <button id="saveBtn">Save Wallet</button>
  
  <div class="balance" id="balanceDisplay" style="display: none;">
    <div class="balance-label">Current Balance</div>
    <div class="balance-amount" id="balanceAmount">--</div>
    <div class="balance-unit">RTC</div>
  </div>
  
  <div class="loading" id="loading" style="display: none;">
    Loading...
  </div>
  
  <div class="error" id="error" style="display: none;"></div>
  
  <div class="last-updated" id="lastUpdated" style="display: none;">
    Last updated: --
  </div>

  <script src="popup.js"></script>
</body>
</html>
